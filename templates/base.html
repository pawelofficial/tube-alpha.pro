<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}YT Investor{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📉</text></svg>" />
  <link rel="stylesheet" href="/static/styles.css">
  {% block extra_head %}{% endblock %}
</head>
<body class="{% if is_authenticated %}auth-content{% endif %}">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-left">
      <button class="mobile-menu-toggle" onclick="toggleSidebar()">☰</button>
      <a href="/" class="topbar-brand">
        <span>🐂🐻</span> YT Investor
      </a>
    </div>
    <div class="topbar-right">
      <div class="authenticated-only">
        <span class="user-info">
          👤 {% if pro %}💎{% else %}🆓{% endif %} {{ user_email or '' }}
        </span>
        <a href="/logout" class="btn btn-outline btn-sm">Sign Out</a>
      </div>
      <div class="public-only">
        <a href="/login?next={{ request.url.path }}" class="btn btn-primary btn-sm">Sign In</a>
      </div>
    </div>
  </div>

  <div class="main-layout">

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-content">

        <div class="sidebar-section">
          <div class="sidebar-section-title">Navigate</div>
          <ul class="sidebar-menu">
            <li class="sidebar-item">
              <a href="/" class="sidebar-link {% if request.url.path == '/' %}active{% endif %}">
                <span class="sidebar-icon">🏠</span>
                <span>Home</span>
              </a>
            </li>
          </ul>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-section-title">Tools</div>
          <ul class="sidebar-menu">
            <li class="sidebar-item">
              <a href="/yourvid" class="sidebar-link {% if request.url.path == '/yourvid' %}active{% endif %}">
                <span class="sidebar-icon">🎬</span>
                <span>Your Video</span>
              </a>
            </li>
          </ul>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-section-title">Account</div>
          <ul class="sidebar-menu">
            <li class="sidebar-item">
              <a href="/profile" class="sidebar-link {% if request.url.path == '/profile' %}active{% endif %}">
                <span class="sidebar-icon">👤</span>
                <span>Profile</span>
              </a>
            </li>
          </ul>
        </div>

      </div>
    </nav>

    <!-- Main content -->
    <main class="main-content">
      {% block content %}{% endblock %}
    </main>

  </div>

  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('mobile-open');
    }
  </script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
